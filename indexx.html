<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡TiNaP! | !PaNiT¡</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-image: url('/mnt/data/swirling-color.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Roboto', sans-serif;
            color: #D8E6FF;
        }
        .overlay {
            background-color: rgba(44, 40, 58, 0.7); /* Reduced opacity for a less muted effect */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-family: 'Merriweather', serif;
            color: #74A4BC; /* Pale Aqua for headers */
            animation: glow 3s infinite alternate;
        }
        p, a {
            color: #D8E6FF; /* Light text color */
        }
        a {
            color: #DB2B39; /* Coral/Orange accent for links */
            text-decoration: none;
            position: relative;
        }
        a:hover {
            text-decoration: underline;
            color: #FF5733;
            animation: pulse 1.5s infinite;
        }
        button {
            background-color: #DB2B39;
            color: #D8E6FF;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #FF5733;
            color: #ffffff;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #74A4BC, 0 0 10px #74A4BC, 0 0 15px #74A4BC;
            }
            to {
                text-shadow: 0 0 10px #74A4BC, 0 0 20px #74A4BC, 0 0 30px #74A4BC;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>This Is Not A Palindrome</h1>
        <p>Welcome to a space where rules are meant to be twisted and beauty is found in the chaos. This is your playground of ideas, art, and expression.</p>
        <button>Explore More</button>
    </div>
</body>
</html>
